<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Manager - SlideChangerOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center">

    <div class="glass max-w-2xl w-full p-8 rounded-2xl shadow-2xl">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-white">Create Your Advertisement</h1>
            <p class="text-slate-400 mt-2">Cost: ₹539/month (Auto-renewing)</p>
        </div>

        <form id="ad-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Desktop Banner (Wide - approx 1200x100px)</label>
                <input type="file" id="desktop-img" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-500/10 file:text-amber-400 hover:file:bg-amber-500/20" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Mobile Banner (Compact - approx 400x100px)</label>
                <input type="file" id="mobile-img" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-500/10 file:text-amber-400 hover:file:bg-amber-500/20" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Destination URL (Where the ad leads)</label>
                <input type="url" id="target-url" placeholder="https://yourwebsite.com" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-4 text-white focus:ring-2 focus:ring-amber-500 outline-none" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg transform active:scale-95">
                Pay ₹539 & Submit for Review
            </button>
        </form>

        <div id="status-msg" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtlgsNhCEsKLHA-WmfoqQleW_n2kCQerI",
            authDomain: "slidechangeronline.firebaseapp.com",
            projectId: "slidechangeronline",
            storageBucket: "slidechangeronline.firebasestorage.app",
            messagingSenderId: "1013262596418",
            appId: "1:1013262596418:web:b7c9ee7e6da7545ff370db"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const AD_PLAN_ID = "plan_Sge1AiEDM3foW9";
        const RAZORPAY_KEY = "rzp_live_KksSstXGAnpZpT"; // Reusing your live key

        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = './index.html';
            currentUser = user;
        });

        document.getElementById('ad-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.textContent = "Uploading Banners...";
            msg.classList.remove('hidden');
            msg.textContent = "Processing images...";

            try {
                // 1. Upload Images
                const desktopFile = document.getElementById('desktop-img').files[0];
                const mobileFile = document.getElementById('mobile-img').files[0];
                const targetUrl = document.getElementById('target-url').value;

                const dUrl = await uploadImage(desktopFile, 'desktop');
                const mUrl = await uploadImage(mobileFile, 'mobile');

                // 2. Create Razorpay Subscription
                msg.textContent = "Initiating Secure Payment...";
                const response = await fetch('https://api-5jm4dxoyka-uc.a.run.app/createRazorpaySubscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: currentUser.uid, 
                        email: currentUser.email,
                        planId: AD_PLAN_ID 
                    })
                });

                const data = await response.json();
                if (!data.subscriptionId) throw new Error("Payment gateway failed.");

                // 3. Open Razorpay
                const options = {
                    key: RAZORPAY_KEY,
                    subscription_id: data.subscriptionId,
                    name: "SlideChanger Online",
                    description: "Ad Network Subscription",
                    handler: async (response) => {
                        msg.textContent = "Payment Verified. Saving Ad Details...";
                        await addDoc(collection(db, "ads"), {
                            ownerId: currentUser.uid,
                            desktopUrl: dUrl,
                            mobileUrl: mUrl,
                            targetUrl: targetUrl,
                            status: 'pending',
                            clicks: 0,
                            createdAt: serverTimestamp(),
                            subscriptionId: data.subscriptionId,
                            paymentId: response.razorpay_payment_id
                        });
                        alert("Ad submitted successfully! It will go live after admin review.");
                        window.location.href = './dashboard.html';
                    },
                    theme: { color: "#F59E0B" }
                };
                const rzp = new Razorpay(options);
                rzp.open();

            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = "Pay ₹539 & Submit for Review";
            }
        });

        async function uploadImage(file, prefix) {
            const path = `ad_banners/${currentUser.uid}/${Date.now()}_${prefix}`;
            const storageRef = ref(storage, path);
            await uploadBytes(storageRef, file);
            return await getDownloadURL(storageRef);
        }
    </script>
</body>
</html>
